name: Deploy ERP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_PRIVATE_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 600s  # ⬆️ Was 120s — migrate + build easily takes 5–10 min
          script: |
            set -e  # Fail fast on any error

            SITE="api.erp.udvell.rolaface.com"
            BENCH_DIR="/srv/apps/erp/backend/rolaface-izayne-bench"
            LOG_FILE="/tmp/deploy_$(date +%Y%m%d_%H%M%S).log"

            echo "📂 Switching to bench directory..."
            cd "$BENCH_DIR"

            su - frappe -c "
              set -e
              BENCH_DIR=\"$BENCH_DIR\"
              SITE=\"$SITE\"

              cd \"\$BENCH_DIR\"

              # Load nvm and switch to Node 24
              export NVM_DIR=~/.nvm
              [ -s \"\$NVM_DIR/nvm.sh\" ] && . \"\$NVM_DIR/nvm.sh\"
              nvm use 24

              # Activate virtual environment
              source env/bin/activate

              echo '📦 Backup...'
              bench --site \"\$SITE\" backup

              echo '⬇️ Pull latest code...'
              cd apps/custom_api
              git fetch origin main
              git reset --hard origin/main  # ⬆️ Safer than pull — avoids merge conflicts
              cd \"\$BENCH_DIR\"

              echo '⚙️ Run migrations...'
              # Capture output; exit code 2 from bench migrate = real error, don't swallow it
              bench --site \"\$SITE\" migrate 2>&1
              echo '✅ Migration complete'

              echo '🎨 Build assets...'
              bench build --verbose 2>&1 | grep -v 'Browserslist: caniuse-lite is outdated' || true

              echo '🧹 Clear cache...'
              bench --site \"\$SITE\" clear-cache
            " 2>&1 | tee "$LOG_FILE"

            # Check if the su block itself failed
            if [ ${PIPESTATUS[0]} -ne 0 ]; then
              echo "❌ Deploy failed. Last 50 lines of log:"
              tail -50 "$LOG_FILE"
              exit 1
            fi

            echo "🔄 Restarting services..."
            supervisorctl restart frappe:

            echo "✅ Deploy complete!"